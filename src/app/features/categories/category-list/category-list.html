<div class="space-y-8">

  <div>
    <h1 class="text-2xl font-bold text-gray-900 text-center">Categories</h1>

  </div>

  @if (categoryLoading()) {
  <div class="flex justify-center py-12">
    <div class="w-8 h-8 border-4 border-primary-600 border-t-transparent rounded-full animate-spin"></div>
  </div>
}
@if (categoryError()) {
  <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg">
    {{ categoryError() }}
  </div>
}

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  @for (category of categories(); track category.slug) {
    <a [routerLink]="['/products']" [queryParams]="{category : category.slug}">
        <app-card>
        <h2 class="font-semibold text-gray-900 capitalize">{{ category.name }}</h2>
        <p class="text-sm text-primary-600 mt-1">{{ category.slug }}</p>
        </app-card>
    </a>
  }
</div>
